version: '3.8'

services:
  # -------------------------------------------------------------
  # 1. NewsNow 服務 (熱榜資料源與閱讀器)
  # -------------------------------------------------------------
  newsnow:
    build: ./newsnow
    container_name: newsnow
    restart: unless-stopped
    ports:
      - '4444:4444'
    volumes:
      - newsnow_data:/usr/app/.data
    environment:
      - HOST=0.0.0.0
      - PORT=4444
      - NODE_ENV=production
      - G_CLIENT_ID=${G_CLIENT_ID:-}
      - G_CLIENT_SECRET=${G_CLIENT_SECRET:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - INIT_TABLE=true
      - ENABLE_CACHE=true
      # - PRODUCTHUNT_API_TOKEN=${PRODUCTHUNT_API_TOKEN:-}

  # -------------------------------------------------------------
  # 2. TrendRadar 服務 (熱點新聞聚合與 AI 趨勢分析推送工具)
  # -------------------------------------------------------------
  trendradar:
    image: wantcat/trendradar:latest
    container_name: trendradar
    restart: unless-stopped
    depends_on:
      - newsnow
    ports:
      - "127.0.0.1:${WEBSERVER_PORT:-8082}:${WEBSERVER_PORT:-8082}"
    volumes:
      # 將本地的 config 與 output 掛載入容器
      - ./TrendRadar-master/config:/app/config:ro
      - ./TrendRadar-master/output:/app/output
    environment:
      - TZ=Asia/Taipei
      # 推送通知渠道設定（可透過此處的環境變數覆蓋 config.yaml）
      # 通用 Webhook
      - GENERIC_WEBHOOK_URL=${GENERIC_WEBHOOK_URL:-}
      - GENERIC_WEBHOOK_TEMPLATE=${GENERIC_WEBHOOK_TEMPLATE:-}
      # AI 模型設定 (可在此設定您的 LLM Key，例如 Gemini/DeepSeek)
      - AI_ANALYSIS_ENABLED=${AI_ANALYSIS_ENABLED:-true}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gemini/gemini-2.5-flash}
      - AI_API_BASE=${AI_API_BASE:-}
      # 定時自動執行排程時間 (預設每 30 分鐘執行一次)
      - CRON_SCHEDULE=${CRON_SCHEDULE:-*/30 * * * *}
      - RUN_MODE=${RUN_MODE:-cron}
      - IMMEDIATE_RUN=${IMMEDIATE_RUN:-true}

  # -------------------------------------------------------------
  # 3. TrendRadar MCP 服務 (提供給 Cursor 等 AI 編輯器使用的 MCP 伺服器)
  # -------------------------------------------------------------
  trendradar-mcp:
    image: wantcat/trendradar-mcp:latest
    container_name: trendradar-mcp
    restart: unless-stopped
    depends_on:
      - trendradar
    ports:
      - "${MCP_HOST:-127.0.0.1}:${MCP_PORT:-3333}:3333"
    volumes:
      - ./TrendRadar-master/config:/app/config:ro
      - ./TrendRadar-master/output:/app/output
    environment:
      - TZ=Asia/Taipei
      - MCP_PORT=${MCP_PORT:-3333}

volumes:
  newsnow_data:
    name: newsnow_data
