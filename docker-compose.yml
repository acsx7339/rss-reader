version: '3.8'

services:
  # -------------------------------------------------------------
  # 1. NewsNow 服務 (熱榜資料源與閱讀器)
  # -------------------------------------------------------------
  newsnow:
    image: ghcr.io/ourongxing/newsnow:latest
    container_name: newsnow
    restart: unless-stopped
    ports:
      - '4444:4444'
    volumes:
      - newsnow_data:/usr/app/.data
    environment:
      - HOST=0.0.0.0
      - PORT=4444
      - NODE_ENV=production
      # 以下為 GitHub 同步設定，若不需要可保持留空
      - G_CLIENT_ID=${G_CLIENT_ID:-}
      - G_CLIENT_SECRET=${G_CLIENT_SECRET:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - INIT_TABLE=true
      - ENABLE_CACHE=true
      # - PRODUCTHUNT_API_TOKEN=${PRODUCTHUNT_API_TOKEN:-}

  # -------------------------------------------------------------
  # 2. TrendRadar 服務 (熱點新聞聚合與 AI 趨勢分析推送工具)
  # -------------------------------------------------------------
  trendradar:
    image: wantcat/trendradar:latest
    container_name: trendradar
    restart: unless-stopped
    depends_on:
      - newsnow
    ports:
      - "127.0.0.1:${WEBSERVER_PORT:-8080}:${WEBSERVER_PORT:-8080}"
    volumes:
      # 將本地的 config 與 output 掛載入容器
      - ./TrendRadar-master/config:/app/config:ro
      - ./TrendRadar-master/output:/app/output
    environment:
      - TZ=Asia/Taipei
      # Web 伺服器連接埠
      - WEBSERVER_PORT=${WEBSERVER_PORT:-8080}
      # 推送通知渠道設定（可透過此處的環境變數覆蓋 config.yaml）
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - DINGTALK_WEBHOOK_URL=${DINGTALK_WEBHOOK_URL:-}
      - WEWORK_WEBHOOK_URL=${WEWORK_WEBHOOK_URL:-}
      - WEWORK_MSG_TYPE=${WEWORK_MSG_TYPE:-}
      # 郵件推送設定
      - EMAIL_FROM=${EMAIL_FROM:-}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD:-}
      - EMAIL_TO=${EMAIL_TO:-}
      - EMAIL_SMTP_SERVER=${EMAIL_SMTP_SERVER:-}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-}
      # ntfy 推送
      - NTFY_SERVER_URL=${NTFY_SERVER_URL:-https://ntfy.sh}
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      - NTFY_TOKEN=${NTFY_TOKEN:-}
      # Bark 手機推送
      - BARK_URL=${BARK_URL:-}
      # Slack 推送
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      # 通用 Webhook
      - GENERIC_WEBHOOK_URL=${GENERIC_WEBHOOK_URL:-}
      - GENERIC_WEBHOOK_TEMPLATE=${GENERIC_WEBHOOK_TEMPLATE:-}
      # AI 模型設定 (可在此設定您的 LLM Key，例如 Gemini/DeepSeek)
      - AI_ANALYSIS_ENABLED=${AI_ANALYSIS_ENABLED:-true}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-gemini/gemini-2.5-flash}
      - AI_API_BASE=${AI_API_BASE:-}
      # 遠端 S3 儲存設定 (選擇性)
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL:-}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_REGION=${S3_REGION:-}
      # 定時自動執行排程時間 (預設每 30 分鐘執行一次)
      - CRON_SCHEDULE=${CRON_SCHEDULE:-*/30 * * * *}
      - RUN_MODE=${RUN_MODE:-cron}
      - IMMEDIATE_RUN=${IMMEDIATE_RUN:-true}

  # -------------------------------------------------------------
  # 3. TrendRadar MCP 服務 (提供給 Cursor 等 AI 編輯器使用的 MCP 伺服器)
  # -------------------------------------------------------------
  trendradar-mcp:
    image: wantcat/trendradar-mcp:latest
    container_name: trendradar-mcp
    restart: unless-stopped
    depends_on:
      - trendradar
    ports:
      - "${MCP_HOST:-127.0.0.1}:${MCP_PORT:-3333}:3333"
    volumes:
      - ./TrendRadar-master/config:/app/config:ro
      - ./TrendRadar-master/output:/app/output
    environment:
      - TZ=Asia/Taipei
      - MCP_PORT=${MCP_PORT:-3333}

volumes:
  newsnow_data:
    name: newsnow_data
